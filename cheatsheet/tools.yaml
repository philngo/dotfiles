sections:
  - title: "Yazi"
    entries:
      - key: "`y`"
        desc: "Open yazi (cd to dir on exit)"
      - key: "`a`"
        desc: "Create file/directory"
      - key: "`r`"
        desc: "Rename"
      - key: "`d`"
        desc: "Move to trash"
      - key: "`.`"
        desc: "Toggle hidden files"
      - key: "`z`"
        desc: "Jump via zoxide"
      - key: "`<CR>`"
        desc: "Open file"
      - key: "`/`"
        desc: "Search"
      - key: "`n` / `N`"
        desc: "Next / previous search result"
      - key: "`Tab`"
        desc: "Select item"
      - key: "`Space`"
        desc: "Toggle selection"
      - key: "`v`"
        desc: "Visual select mode"
      - key: "`1-9`"
        desc: "Switch tab"
      - key: "`t`"
        desc: "New tab"
      - key: "`q`"
        desc: "Quit"

  - title: "Atuin"
    entries:
      - key: "`Ctrl-r`"
        desc: "Interactive fuzzy search (all sessions)"
      - key: "`Up arrow`"
        desc: "Prefix search from current input"
      - key: "`Tab`"
        desc: "Insert command (edit before running)"
      - key: "`atuin stats`"
        desc: "Usage statistics"
      - key: ""
        desc: "Leading space = command not recorded (secrets filter)"
