sections:
  - title: "jj (Jujutsu)"
    entries:
      - key: "`jj`"
        desc: "Log (default)"
      - key: "`jj git init`"
        desc: "Init new jj repo"
      - key: "`jj st`"
        desc: "Status"
      - key: "`jj l`"
        desc: "Log"
      - key: "`jj ll`"
        desc: "Log (mutable revisions + descendants + trunk)"
      - key: "`jj d`"
        desc: "Diff"
      - key: "`jj ds`"
        desc: "Diff --stat"
      - key: "`jj n`"
        desc: "New"
      - key: "`jj f`"
        desc: "Git fetch"
      - key: "`jj p`"
        desc: "Git push"
      - key: "`c`"
        desc: "Confirm selection in `jj squash` interactive"

  - title: "jj Shell Functions"
    entries:
      - key: "`js`"
        desc: "Fuzzy switch jj bookmark"
      - key: "`jjs`"
        desc: "Fetch main + rebase mutable revisions"
      - key: "`jr <bookmark>`"
        desc: "Fetch a specific remote bookmark"
      - key: "`vb`"
        desc: "Open all files changed vs trunk in nvim"
      - key: "`jw-add [suffix]`"
        desc: "Create sibling workspace (default: -1)"
      - key: "`jw-rm [suffix]`"
        desc: "Remove sibling workspace (default: -1)"
      - key: "`jw-list`"
        desc: "List jj workspaces"
