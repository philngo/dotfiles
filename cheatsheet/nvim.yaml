sections:
  - title: "Neovim — Quick Access"
    entries:
      - key: "`;`"
        desc: "Command mode (instead of :)"
      - key: "`kj`"
        desc: "Escape (insert mode)"
      - key: "`<Esc>`"
        desc: "Clear search highlight (normal mode)"

  - title: "Neovim — Navigation"
    entries:
      - key: "`C-p`"
        desc: "Find files (Telescope)"
      - key: "`C-j` / `C-k`"
        desc: "Previous / next buffer"
      - key: "`,n`"
        desc: "Toggle file tree (NvimTree)"
      - key: "`,b`"
        desc: "Buffers (Telescope)"
      - key: "`gd`"
        desc: "Go to definition"
      - key: "`gy`"
        desc: "Go to type definition"
      - key: "`gi`"
        desc: "Go to implementation"
      - key: "`gr`"
        desc: "Go to references"

  - title: "Neovim — Search"
    entries:
      - key: "`,fg`"
        desc: "Live grep"
      - key: "`,fh`"
        desc: "Help tags"
      - key: "`,gs`"
        desc: "Git status (Telescope)"
      - key: "`,js`"
        desc: "jj status (changed files in working copy)"
      - key: "`,jb`"
        desc: "jj branch files (changed vs trunk)"

  - title: "Neovim — Editing"
    entries:
      - key: "`<CR>`"
        desc: "Add new line below (normal mode)"
      - key: "`<S-Enter>`"
        desc: "Add new line above (normal mode)"
      - key: "`<Space>`"
        desc: "Insert space at cursor (normal mode)"
      - key: "`y`"
        desc: "Yank and keep selection (visual mode)"
      - key: "`>` / `<`"
        desc: "Indent / outdent and keep selection (visual mode)"
      - key: "`,f`"
        desc: "Format buffer (conform.nvim)"
      - key: "`,tw`"
        desc: "Trim trailing whitespace"
      - key: "`,md`"
        desc: "Toggle markdown preview (opens in browser)"

  - title: "Neovim — LSP"
    entries:
      - key: "`K`"
        desc: "Hover documentation"
      - key: "`,rn`"
        desc: "Rename symbol"
      - key: "`,ca`"
        desc: "Code action"
      - key: "`<Space>a`"
        desc: "Open diagnostic float"
      - key: "`[d` / `]d`"
        desc: "Previous / next diagnostic"

  - title: "Neovim — Completion"
    entries:
      - key: "`C-Space`"
        desc: "Trigger completion"
      - key: "`Tab` / `S-Tab`"
        desc: "Next / previous item (or snippet jump)"
      - key: "`<CR>`"
        desc: "Confirm completion"
      - key: "`C-b` / `C-f`"
        desc: "Scroll docs up / down"

  - title: "Neovim — Surround"
    entries:
      - key: "`ys{motion}{char}`"
        desc: "Add surround (e.g. ysiw\" wraps word in quotes)"
      - key: "`ds{char}`"
        desc: "Delete surround"
      - key: "`cs{old}{new}`"
        desc: "Change surround"

  - title: "Neovim — Comments"
    entries:
      - key: "`gc{motion}`"
        desc: "Toggle line comment (e.g. gcc for current line)"
      - key: "`gb{motion}`"
        desc: "Toggle block comment"

  - title: "Neovim — Config"
    entries:
      - key: "`,v`"
        desc: "Edit nvim config"
      - key: "`,z`"
        desc: "Edit zshrc"
      - key: "`,sv`"
        desc: "Source nvim config"

notes:
  - "Neovim filetype notes: Web languages use 2-space indent, Python uses 4-space. Markdown/text/rst have spell check. `.html` defaults to htmldjango."
